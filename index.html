<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Food Truck</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        #tela-tv { display: flex; height: 100vh; }
        .col { flex: 1; border: 2px solid #333; }
        .senha { font-size: 5rem; background: #333; margin: 10px; border-radius: 10px; padding: 10px; }
        .item-ctrl { background: #333; padding: 15px; margin: 10px; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 15px; font-weight: bold; cursor: pointer; }
        [hidden] { display: none; }
    </style>
</head>
<body>
    <div id="tela-tv" hidden>
        <div class="col"><h2 style="color:red">EM PREPARO</h2><div id="grid-preparo"></div></div>
        <div class="col"><h2 style="color:green">PRONTOS</h2><div id="grid-pronto"></div></div>
    </div>
    <div id="tela-controle" hidden>
        <h2>GESTOR</h2>
        <input type="number" id="num" style="font-size:2rem; width:100px">
        <button onclick="add()">CHAMAR</button>
        <div id="lista"></div>
    </div>
    <script>
        const _supabase = supabase.createClient('https://daqhteaqcraitmcgwmhc.supabase.co', 'sb_publishable_CVahLsQGZYPI-x9Gbogcjw_DpBGMFGG');
        const modo = new URLSearchParams(window.location.search).get('modo');
        if(modo === 'tv') document.getElementById('tela-tv').hidden = false;
        else document.getElementById('tela-controle').hidden = false;

        async function add() {
            const n = document.getElementById('num').value;
            await _supabase.from('pedidos').insert([{ numero: n, status: 'preparo' }]);
            document.getElementById('num').value = '';
            render();
        }
        async function mover(id) {
            await _supabase.from('pedidos').update({ status: 'pronto' }).eq('id', id);
            render();
        }
        async function apagar(id) {
            await _supabase.from('pedidos').delete().eq('id', id);
            render();
        }
        async function render() {
            const { data } = await _supabase.from('pedidos').select('*');
            if(!data) return;
            if(modo === 'tv') {
                document.getElementById('grid-preparo').innerHTML = data.filter(x => x.status !== 'pronto').map(x => `<div class="senha">${x.numero}</div>`).join('');
                document.getElementById('grid-pronto').innerHTML = data.filter(x => x.status === 'pronto').map(x => `<div class="senha" style="color:green">${x.numero}</div>`).join('');
            } else {
                document.getElementById('lista').innerHTML = data.map(x => `
                    <div class="item-ctrl">
                        <span>Senha ${x.numero} (${x.status})</span>
                        <div>
                            <button onclick="mover(${x.id})">PRONTO</button>
                            <button onclick="apagar(${x.id})">OK</button>
                        </div>
                    </div>
                `).join('');
            }
        }
        _supabase.channel('pedidos').on('postgres_changes', {event:'*', schema:'public', table:'pedidos'}, render).subscribe();
        render();
    </script>
</body>
</html>
